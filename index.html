<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a3a6e" />
  <meta name="description" content="서울온라인학교 정보안전부에서 운영하는 디지털 안전 학습 사이트" />
  <title>서울온라인학교 · 정보안전 학습관</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================
       부팅 화면
  ============================================= -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-logo">
      <div class="boot-logo-mark">
        <img src="logo.svg" alt="서울온라인학교" width="120" height="120" />
      </div>
      <div class="boot-school">서울온라인학교</div>
      <div class="boot-sub">정보안전 학습관</div>
    </div>
    <div class="boot-spinner" aria-hidden="true">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div>
    </div>
    <div class="boot-text">시작하는 중...</div>
  </div>

  <!-- ============================================
       데스크톱
  ============================================= -->
  <div id="desktop" class="desktop hidden">

    <!-- 바탕화면 로고(워터마크) -->
    <div class="wallpaper-logo" aria-hidden="true">
      <img src="logo.svg" alt="" />
      <div class="wallpaper-name">서울온라인학교</div>
      <div class="wallpaper-sub">정보안전 학습관</div>
    </div>

    <!-- 바탕화면 아이콘 -->
    <div class="desktop-icons" id="desktop-icons"></div>

    <!-- 데스크톱 위젯(달력/메모) -->
    <div class="desktop-widgets">
      <div class="widget widget-welcome">
        <div class="widget-title">환영합니다, 학생 여러분!</div>
        <div class="widget-body">
          오늘은 <span id="widget-date"></span>입니다.<br/>
          오른쪽 아래 <strong>시작</strong> 버튼을 누르거나 바탕화면 아이콘을 더블클릭해 학습을 시작해보세요.
        </div>
      </div>
    </div>

    <!-- 창들이 들어가는 컨테이너 -->
    <div id="windows-container" class="windows-container"></div>

    <!-- ==========================================
         시작 메뉴
    =========================================== -->
    <div id="start-menu" class="start-menu" aria-hidden="true">
      <div class="start-menu-left">
        <div class="start-user">
          <div class="user-avatar">👤</div>
          <div class="user-name">학생</div>
        </div>
        <div class="start-app-list" id="start-app-list"></div>
        <div class="start-bottom">
          <div class="start-bottom-item" title="설정" data-action="info">
            <span class="ico">⚙</span><span class="lbl">설정</span>
          </div>
          <div class="start-bottom-item" title="전원" data-action="shutdown">
            <span class="ico">⏻</span><span class="lbl">전원</span>
          </div>
        </div>
      </div>
      <div class="start-menu-right">
        <div class="tiles-section-title">정보안전 학습</div>
        <div class="tiles" id="tiles"></div>
        <div class="tiles-section-title second">학습 도구</div>
        <div class="tiles" id="tiles2"></div>
      </div>
    </div>

    <!-- ==========================================
         작업 표시줄
    =========================================== -->
    <div class="taskbar" id="taskbar">
      <button class="start-btn" id="start-btn" title="시작" aria-label="시작">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <rect x="2"  y="2"  width="9" height="9" fill="currentColor"/>
          <rect x="13" y="2"  width="9" height="9" fill="currentColor"/>
          <rect x="2"  y="13" width="9" height="9" fill="currentColor"/>
          <rect x="13" y="13" width="9" height="9" fill="currentColor"/>
        </svg>
      </button>

      <div class="search-box" id="search-box">
        <span class="search-icon">🔎</span>
        <span class="search-text">검색하려면 여기에 입력하세요</span>
      </div>

      <div class="task-view" title="작업 보기">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="2" y="4" width="14" height="14" rx="1"/>
          <rect x="7" y="9" width="14" height="11" rx="1"/>
        </svg>
      </div>

      <div class="taskbar-apps" id="taskbar-apps"></div>

      <div class="system-tray">
        <div class="tray-icons">
          <span title="네트워크">🌐</span>
          <span title="소리">🔊</span>
          <span title="알림">💬</span>
        </div>
        <div class="clock" id="clock">
          <div class="time" id="time">--:--</div>
          <div class="date" id="date">----.--.--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================
       앱 콘텐츠 템플릿 (DOM에 미리 두고 JS가 복제)
  ============================================= -->

  <!-- 챗봇 도우미 -->
  <template id="tpl-chatbot">
    <div class="app-chatbot">
      <div class="app-banner">
        <div class="banner-title">🤖 챗봇 도우미</div>
        <div class="banner-sub">궁금한 점은 챗봇에게 자유롭게 물어보세요. 정보안전, 디지털 시민, 수업 활동 등에 대한 질문을 환영합니다.</div>
      </div>
      <div class="chat-host">
        <iframe
          src="https://copilotstudio.microsoft.com/environments/f3d6ac12-b6ac-e1ba-a225-e2244d331288/bots/crcda_seoulonline_chatbot01/webchat?__version__=2"
          frameborder="0"
          title="서울온라인학교 챗봇"></iframe>
      </div>
    </div>
  </template>

  <!-- 정보안전 퀴즈 -->
  <template id="tpl-quiz">
    <div class="app-quiz">
      <div class="quiz-header">
        <div class="quiz-title">🛡️ 정보안전 퀴즈</div>
        <div class="quiz-sub">디지털 세상에서 우리를 안전하게 지켜주는 8가지 질문입니다.</div>
      </div>
      <div class="quiz-progress">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill"></div></div>
        <div class="quiz-progress-text">0 / 0</div>
      </div>
      <div class="quiz-body"></div>
      <div class="quiz-footer">
        <button class="btn btn-secondary" data-q-action="prev">◀ 이전</button>
        <button class="btn btn-primary" data-q-action="next">다음 ▶</button>
      </div>
    </div>
  </template>

  <!-- 학습 카드 -->
  <template id="tpl-cards">
    <div class="app-cards">
      <div class="cards-header">
        <div class="cards-title">📚 정보안전 학습 카드</div>
        <div class="cards-sub">카드를 클릭하면 자세한 설명을 볼 수 있어요.</div>
      </div>
      <div class="cards-grid"></div>
    </div>
  </template>

  <!-- 안전 체크리스트 -->
  <template id="tpl-checklist">
    <div class="app-checklist">
      <div class="check-header">
        <div class="check-title">✅ 오늘의 디지털 안전 체크리스트</div>
        <div class="check-sub">하나씩 점검하면서 오늘의 안전 점수를 확인해보세요.</div>
      </div>
      <div class="check-score">
        <div class="check-score-bar"><div class="check-score-fill"></div></div>
        <div class="check-score-text">0% 완료</div>
      </div>
      <ul class="check-list"></ul>
      <div class="check-footer">
        <button class="btn btn-secondary" data-c-action="reset">초기화</button>
      </div>
    </div>
  </template>

  <!-- 자료 폴더 (SharePoint Graph API 기반 탐색기 + 미리보기) -->
  <template id="tpl-resources">
    <div class="app-explorer app-sharepoint-mode">
      <div class="sp-banner">
        <div class="sp-folder-icon">📁</div>
        <div class="sp-banner-info">
          <div class="sp-banner-title">학생 안내용 자료</div>
          <div class="sp-banner-sub">서울온라인학교 SharePoint</div>
        </div>
        <a class="sp-open-link" target="_blank" rel="noopener">새 창에서 열기 ↗</a>
      </div>
      <div class="exp-toolbar">
        <button class="exp-nav-btn" data-x-action="back" title="뒤로" disabled>◀</button>
        <button class="exp-nav-btn" data-x-action="fwd"  title="앞으로" disabled>▶</button>
        <button class="exp-nav-btn" data-x-action="up"   title="위로" disabled>▲</button>
        <div class="exp-address">
          <span class="exp-address-icon">📁</span>
          <span class="exp-address-path">자료 폴더</span>
        </div>
        <button class="exp-nav-btn" data-x-action="refresh" title="새로 고침">⟳</button>
      </div>
      <div class="exp-body">
        <div class="exp-files"></div>
      </div>
      <div class="exp-status">
        <span class="exp-count">0개 항목</span>
        <span class="exp-hint">파일을 클릭하면 미리보기 창이 열려요</span>
      </div>
    </div>
  </template>

  <!-- 파일 뷰어 (PDF / PPTX) -->
  <template id="tpl-viewer">
    <div class="app-viewer">
      <div class="viewer-toolbar">
        <span class="viewer-icon"></span>
        <span class="viewer-name"></span>
        <span class="viewer-spacer"></span>
        <a class="viewer-dl" download>⤓ 다운로드</a>
      </div>
      <div class="viewer-host"></div>
    </div>
  </template>

  <!-- 정보안전 챌린지 (마리오 풍 미니게임) -->
  <template id="tpl-game">
    <div class="app-game">
      <div class="game-hud">
        <span class="hud-item hud-lives" title="남은 목숨">❤️❤️❤️</span>
        <span class="hud-item hud-score">점수: 0</span>
        <span class="hud-item hud-coins">🪙 0</span>
        <span class="hud-spacer"></span>
        <span class="hud-item hud-best">최고: 0</span>
        <button class="hud-restart" title="다시 시작">↻</button>
      </div>
      <div class="game-stage">
        <canvas class="game-canvas" width="640" height="400"></canvas>
        <div class="game-overlay"></div>
        <div class="game-touch-controls">
          <div class="tc-group tc-left-group">
            <button class="tc-btn tc-left" aria-label="왼쪽">◀</button>
            <button class="tc-btn tc-right" aria-label="오른쪽">▶</button>
          </div>
          <div class="tc-group tc-right-group">
            <button class="tc-btn tc-jump" aria-label="점프">▲</button>
          </div>
        </div>
      </div>
      <div class="game-instructions">
        <strong>조작</strong> · ←/→ 이동 · Space / ↑ 점프 ·
        <strong>목표</strong> · 적은 위에서 밟고, ?블록 문제를 풀어 점수를 모아 🏁 깃발로!
      </div>
    </div>
  </template>

  <!-- 학교 소개 -->
  <template id="tpl-about">
    <div class="app-about">
      <div class="about-hero">
        <div class="about-logo">
          <img src="logo.svg" alt="서울온라인학교" width="64" height="64" />
        </div>
        <div>
          <div class="about-title">서울온라인학교</div>
          <div class="about-sub">정보안전부 · 학생 안내용 학습관</div>
        </div>
      </div>
      <div class="about-body">
        <p>이 학습관은 <strong>서울온라인학교 정보안전부</strong>에서 학생 여러분의 디지털 안전 역량을 기르기 위해 마련한 작은 공간입니다.</p>
        <p>오른쪽 챗봇 도우미와 함께 궁금한 점을 자유롭게 물어보고, 퀴즈와 카드, 체크리스트로 디지털 시민으로서 갖추어야 할 태도를 점검해보세요.</p>
        <h4>학습 목표</h4>
        <ul>
          <li>정보 사회에서 발생할 수 있는 위험 요소를 이해할 수 있다.</li>
          <li>개인정보와 디지털 발자국을 스스로 관리할 수 있다.</li>
          <li>디지털 도구를 안전하고 책임감 있게 활용할 수 있다.</li>
        </ul>
        <h4>이용 방법</h4>
        <ul>
          <li>바탕화면 아이콘을 <strong>더블클릭</strong>하면 앱이 열립니다.</li>
          <li>왼쪽 아래 <strong>시작 버튼</strong>을 누르면 앱 목록과 타일이 나타납니다.</li>
          <li>창은 <strong>드래그</strong>하여 옮길 수 있고, <strong>최소화 / 최대화 / 닫기</strong> 버튼이 있습니다.</li>
        </ul>
        <p class="about-foot">© 서울온라인학교 정보안전부</p>
      </div>
    </div>
  </template>

  <!-- 자료 폴더 파일 목록 (선생님이 편집) -->
  <script src="자료/files.js" onerror="window.MATERIAL_FILES = window.MATERIAL_FILES || [];"></script>
  <script src="app.js"></script>
</body>
</html>
